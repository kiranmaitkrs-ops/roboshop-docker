services:
  catalogue:
      build: ./catalogue
      image: kiranmairam/catalogue:1.0.0
      container_name: catalogue
      depends_on:
      - mongodb
  user:
      build: ./user
      image: kiranmairam/user:1.0.0
      container_name: user
      depends_on:
      - mongodb
      - redis
  cart:
      build: ./cart
      image: kiranmairam/cart:1.0.0
      container_name: cart
      depends_on:
      - catalogue
      - redis
  shipping:
      build: ./shipping
      image: kiranmairam/shipping:1.0.0
      container_name: shipping
      depends_on:
      - mysql
      - cart
  payment:
      build: ./payment
      image: kiranmairam/payment:1.0.0
      container_name: payment
      environment:
        CART_HOST: "cart"
        CART_PORT: "8080"
        USER_HOST: "user"
        USER_PORT: "8080"
        AMQP_HOST: "rabbitmq"
        AMQP_USER: "roboshop"
        AMQP_PASS: "roboshop123"
      depends_on:
      - user
      - cart
      - rabbitmq
  frontend:
      build: ./frontend
      image: kiranmairam/frontend:1.0.0
      container_name: frontend
      ports:
      - "80:80"
      depends_on:
      - shipping
      - catalogue
      - user
      - cart
      - payment
  mongodb:
    build: ./mongodb 
    image: kiranmairam/mongodb:1.0.0 
    container_name: mongodb
    volumes:
    - /:/data/db
  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data
  mysql:
    build: ./mysql
    image: kiranmairam/mysql:1.0.0
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql
  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
    volumes:
    - rabbitmq:/var/lib/rabbitmq
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually
volumes:
  mongodb: # docker volume create mongodb
  redis:
  mysql:
  rabbitmq:


